<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tests — Dash Block Subsidy Calculator</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #111827;
            color: #e5e7eb;
            padding: 2rem;
            line-height: 1.6;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        #summary {
            font-size: 1.1rem;
            font-weight: 600;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }
        #summary.all-pass { background: rgba(52, 211, 153, 0.15); color: #34d399; }
        #summary.has-fail { background: rgba(248, 113, 113, 0.15); color: #f87171; }
        .test { padding: 0.35rem 0; font-family: 'SF Mono', Consolas, monospace; font-size: 0.85rem; }
        .test .badge {
            display: inline-block;
            width: 3.5rem;
            text-align: center;
            font-weight: 700;
            border-radius: 4px;
            padding: 0.1rem 0.4rem;
            margin-right: 0.5rem;
            font-size: 0.75rem;
        }
        .test.pass .badge { background: rgba(52, 211, 153, 0.2); color: #34d399; }
        .test.fail .badge { background: rgba(248, 113, 113, 0.2); color: #f87171; }
        .detail { color: #9ca3af; margin-left: 4.5rem; font-size: 0.8rem; }
    </style>
</head>
<body>
    <h1>Dash Subsidy Calculator Tests</h1>
    <div id="summary">Running...</div>
    <div id="results"></div>

    <script src="test.js"></script>
    <script>
    (function() {
        const { passed, failed, results } = window.__testResults;
        const total = passed + failed;

        const summary = document.getElementById('summary');
        summary.textContent = `${total} tests: ${passed} passed, ${failed} failed`;
        summary.className = failed > 0 ? 'has-fail' : 'all-pass';

        const container = document.getElementById('results');
        for (const r of results) {
            const div = document.createElement('div');
            div.className = 'test ' + (r.pass ? 'pass' : 'fail');
            div.innerHTML = `<span class="badge">${r.pass ? 'PASS' : 'FAIL'}</span>${r.name}`;
            container.appendChild(div);
            if (!r.pass && r.detail) {
                const detail = document.createElement('div');
                detail.className = 'detail';
                detail.textContent = r.detail;
                container.appendChild(detail);
            }
        }
    })();
    </script>
</body>
</html>
